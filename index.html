<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LCFC Supporter Groups Map</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="ui">
    <div class="search">
      <input id="search" type="search" placeholder="Search for a club..." />
      <button id="clear" aria-label="Clear">✕</button>
    </div>

    <div class="cta">
      <span>Can’t find a club? Start one!</span>
      <a class="btn" id="formClub" href="#" target="_blank" rel="noreferrer">FORM A CLUB</a>
    </div>

    <div id="results" class="results"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>


  <script src="./app.js" type="module"></script>

  <!-- Google Maps -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDhkTnDunv3OHDvaTgiawkWiIh58_Wz0E&callback=initMap"
    async defer></script>
</body>
</html>
