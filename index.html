<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LCFC Supporter Groups Map</title>

  <!-- Cache busting: bump v when you deploy -->
  <link rel="stylesheet" href="./styles.css?v=1" />
</head>
<body>
  <div class="ui sheet" id="sheet">
    <!-- Mobile collapsed bar -->
    <button class="sheet-handle" id="sheetToggle" aria-label="Search clubs">
      <span class="sheet-handle__pill" aria-hidden="true"></span>
      <span class="sheet-handle__text">Search clubs</span>
    </button>

    <!-- Panel content -->
    <div class="sheet-body" id="sheetBody">
      <div class="search">
        <input id="search" type="search" placeholder="Search for a club..." autocomplete="off" />
        <button id="clear" aria-label="Clear search">✕</button>
      </div>

      <div class="cta">
        <span>Can’t find a club? Start one!</span>
        <a class="btn" id="formClub" href="#" target="_blank" rel="noreferrer">FORM A CLUB</a>
      </div>

      <div id="results" class="results" role="list"></div>
    </div>
  </div>

  <div id="map"></div>

  <!-- Clusterer (global) -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <!-- Your app (NOT module) + cache busting -->
  <script src="./app.js?v=1"></script>

  <!-- Google Maps -->
  <script
    async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDhkTnDunv3OHDvaTgiawkWiIh58_Wz0E&callback=initMap&loading=async">
  </script>
</body>
</html>
